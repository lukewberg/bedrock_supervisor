syntax = "proto3";
package rcon.v1;

service RCONService {
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {}
  rpc ListBackups(ListBackupsRequest) returns (ListBackupsResponse) {}
  rpc RestoreBackup(RestoreBackupRequest) returns (stream RestoreBackupResponse) {}
  rpc ServerSTDIO(stream ServerSTDIORequest) returns (stream ServerSTDIOResponse) {}
}

message ServerSTDIORequest {
  string command = 1;
}

/// The output of the command
message ServerSTDIOResponse {
  string output = 1;
  bool is_error = 2; // true if the output is an error message
}

enum BackupStatus {
  BACKUP_STATUS_UNSPECIFIED = 0;
  BACKUP_STATUS_IN_PROGRESS = 1;
  BACKUP_STATUS_COMPLETED = 2;
  BACKUP_STATUS_FAILED = 3;
}

message RestoreBackupResponse {
  BackupStatus status = 1;
  string message = 2;
  int32 progress = 3; // Progress percentage
}

message RestoreBackupRequest {
  string backup_id = 1;
}

enum ScheduleType {
  SCHEDULE_TYPE_UNSPECIFIED = 0;
  SCHEDULE_TYPE_MINUTE = 1;
  SCHEDULE_TYPE_HOURLY = 2;
  SCHEDULE_TYPE_DAILY = 3;
  SCHEDULE_TYPE_WEEKLY = 4;
}

message BackupMetadata {
  string id = 1;
  string timestamp = 2;
  int64 size = 3; // bytes
}

message ListBackupsRequest {
  ScheduleType schedule_type = 1;
}

message ListBackupsResponse {
  repeated BackupMetadata backups = 1;
}

message GetStatusRequest {}

message GetStatusResponse {
  string status = 1;
}
